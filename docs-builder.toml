schema_version = 1

[project]
name = "mdBook Workshop"
slug = "mdbook-workshop"
mode = "new"
request = "何もない新規リポジトリから、agent-builder を使って mdBook のワークショップ記事サイトを作りたい。ワークショップ自体で plan-manager -> task-planner -> task-worker の流れも体験できるようにする。"
summary = "agent-builder の実運用を題材に、mdBook でワークショップ記事サイトを構築するプロジェクト"
primary_deliverable = "mdbook_site"
target_users = ["workshop_participant", "developer_educator"]

[workflow]
profile = "standard"
role_model = "four_role_default"
packs = ["obsidian_canvas_pack"]
review_required = true

[bootstrap]
seed_discovery_block = true
reference_seed = ["product_sense", "design", "attention_queue", "human_manual"]

[obsidian]
canvas_path = "docs/exec-plans/canvas/development-flow.canvas"
reference_dir = "docs/references"

[discovery]
confirmed = [
  "対象は何もない新規リポジトリである",
  "成果物は mdBook のワークショップ記事サイトである",
  "ワークショップの中で agent-builder 自体の使い方も体験させる",
]
assumptions = [
  "最初のスコープは mdBook の最小構成と 3 から 4 章程度の記事に絞る",
  "参加者に見せたい主眼は mdBook 単体ではなく、agent-builder の開発フロー体験である",
  "Rust と cargo は利用可能、または導入手順をワークショップ内で案内する",
]
non_goals = [
  "最初から凝ったテーマや高度なカスタム UI を作ること",
  "記事の全章を一度に完成させること",
  "動画配信や外部 CMS 連携まで扱うこと",
]
constraints = [
  "block -> chunk -> ticket の流れをワークショップ中に追えるようにする",
  "canvas を見ながら進捗を説明できるようにする",
  "参加者が agent ごとの役割を理解できるよう、Human Manual と README の導線を保つ",
]

[generation]
output_root = "."
overwrite_policy = "safe_merge"
include_examples = false
